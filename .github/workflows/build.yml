name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    name: Compile Java sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Show Java version
        run: |
          java -version
          javac -version

      - name: Check project dependencies
        run: |
          test -d bin || {
            echo "::error::Missing bin/ directory. The README expects compiled dependencies under bin/*."
            exit 1
          }

          if ! find bin -maxdepth 1 -type f -name '*.jar' | grep -q .; then
            echo "::error::No jar files found under bin/. The README expects bin/* on the javac classpath."
            exit 1
          fi

          if [ ! -d lib ]; then
            echo "::warning::lib/ is not present. Continuing with bin/* only; add lib/*.jar if javac reports missing external classes."
          fi

      - name: Compile application sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/production/gsl5

          mapfile -t gbk_sources < <(
            find src/core src/shells src/util -name '*.java' \
              ! -path 'src/shells/plugins/generic/McpService.java' \
              | sort
          )

          javac -encoding GBK -cp "lib/*:bin/*" -d out/production/gsl5 "${gbk_sources[@]}"

          javac -encoding UTF-8 -cp "lib/*:bin/*:out/production/gsl5" \
            -d out/production/gsl5 src/shells/plugins/generic/McpService.java

      - name: Package jar
        run: |
          mkdir -p out/artifacts/gsl5_jar
          jar cfm out/artifacts/gsl5_jar/gsl5.jar src/META-INF/MANIFEST.MF -C out/production/gsl5 .
