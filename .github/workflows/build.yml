name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  compile:
    name: Compile Java sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Show Java version
        run: |
          java -version
          javac -version

      - name: Prepare CI dependencies
        run: |
          mkdir -p lib/ci
          curl -fsSL https://repo.maven.apache.org/maven2/org/ow2/asm/asm/9.6/asm-9.6.jar \
            -o lib/ci/asm-9.6.jar
          echo "aa205cf0a06dbd8e04ece91c0b37c3f5d567546a  lib/ci/asm-9.6.jar" | sha1sum -c -

      - name: Check project dependencies
        run: |
          test -d bin || {
            echo "::error::Missing bin/ directory. The README expects compiled dependencies under bin/*."
            exit 1
          }

          if ! find bin -maxdepth 1 -type f -name '*.jar' | grep -q .; then
            echo "::error::No jar files found under bin/. The README expects bin/* on the javac classpath."
            exit 1
          fi

          if [ ! -d lib ]; then
            echo "::warning::lib/ is not present. Continuing with bin/* only; add lib/*.jar if javac reports missing external classes."
          fi

      - name: Compile application sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/production/gsl5
          CI_CLASSPATH="lib/ci/*:lib/*:bin/*:src/shells/plugins/java/assets/asm:out/production/gsl5"

          find src/core src/shells src/util -name '*.java' | sort > out/ci-java-sources.txt

          python3 - <<'PY'
          from pathlib import Path

          utf8_sources = []
          gbk_sources = []

          for line in Path("out/ci-java-sources.txt").read_text(encoding="utf-8").splitlines():
              data = Path(line).read_bytes()
              try:
                  data.decode("utf-8")
              except UnicodeDecodeError:
                  gbk_sources.append(line)
              else:
                  utf8_sources.append(line)

          Path("out/utf8-sources.txt").write_text("\n".join(utf8_sources) + "\n", encoding="utf-8")
          Path("out/gbk-sources.txt").write_text("\n".join(gbk_sources) + "\n", encoding="utf-8")
          print("UTF-8/ASCII sources:", len(utf8_sources))
          print("GBK sources:", len(gbk_sources))
          PY

          if [ -s out/utf8-sources.txt ]; then
            javac -encoding UTF-8 -cp "$CI_CLASSPATH" \
              -d out/production/gsl5 @out/utf8-sources.txt
          fi

          if [ -s out/gbk-sources.txt ]; then
            javac -encoding GBK -cp "$CI_CLASSPATH" \
              -d out/production/gsl5 @out/gbk-sources.txt
          fi

      - name: Package jar
        run: |
          mkdir -p out/artifacts/gsl5_jar
          unzip -q -o lib/ci/asm-9.6.jar -d out/production/gsl5
          rm -f out/production/gsl5/META-INF/MANIFEST.MF
          jar cfm out/artifacts/gsl5_jar/gsl5.jar src/META-INF/MANIFEST.MF -C out/production/gsl5 .

      - name: Generate checksum
        run: |
          sha256sum out/artifacts/gsl5_jar/gsl5.jar > out/artifacts/gsl5_jar/gsl5.jar.sha256
          cat out/artifacts/gsl5_jar/gsl5.jar.sha256

      - name: Upload build artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsl5-jar
          path: |
            out/artifacts/gsl5_jar/gsl5.jar
            out/artifacts/gsl5_jar/gsl5.jar.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Build summary
        env:
          ARTIFACT_URL: ${{ steps.upload_artifact.outputs.artifact-url }}
        run: |
          {
            echo "## Build complete"
            echo
            echo "- Artifact: \`gsl5-jar\`"
            echo "- Files: \`gsl5.jar\`, \`gsl5.jar.sha256\`"
            echo "- Download: ${ARTIFACT_URL}"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          } >> "$GITHUB_STEP_SUMMARY"
